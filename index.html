<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>portofolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css
">
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }
    header{
        height: 100vh;
        width: 100%;
        background: url("images/background.png") no-repeat;
        background-position: center;
    }
    header nav{
        position: fixed;
        /* background-color: rgb(43, 0, 255); */
        width: 100%;
        top: 0;
        left: 0;
        z-index: 100;

    }
    header .navbar{
        width: 90%;
        /* background-color: aquamarine; */
        margin: 20px auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .navbar .logo{
        height: 80px;
        width: 150px;
        /* background-color: brown; */
    }
    .navbar .logo img{
        width: 100%;
        height: 100%;
        object-fit: contain;
    }
    .navbar ul{
        display: flex;

    }
    .navbar li{
        list-style: none;
        margin: auto 10px;
    }
    .navbar li a{
        text-decoration: none;
        font-size: 18px;
        color: #3c3b3b;
        font-weight: 500;
    }
    .navbar li a:hover{
        color: #000;
    }
    .navbar .search{
        position: relative;
        height: 40px;
        width: 250px;
    }
    .navbar .search input[type="text"]{
        position: absolute;
        left: 0;
        bottom: 0;
        height: 100%;
        width: 100%;
        outline: none;
        border-radius: 8px;
        border: 2px solid #000000a2;
        padding: 0 40px ;
    }
    .search a{
        position: absolute;
        left: 10px;
        transform: translateY(50%);
        color: blue;
        font-size: 20px;

    }
    .content {
        position: absolute;
        top: 33%;
        left: 10%;
    }
    .content .text{
        font-size: 27px;
        color: #454141;

    }
    .content .name{
        font-size: 75px;
        margin: -11px 0 0 -3px;
    }
    .content .job{
        font-size: 40px;
        display: flex;
    }
    .content .job .typing-text{
        color: rgb(17, 214, 214);
        margin-left: 16px;
        animation: typing 5s steps(15) infinite;
        overflow: hidden;
        white-space: nowrap;
        border-right: 4px solid rgb(25, 203, 220);


    }
    @keyframes typing{
        0%{
            width: 0ch;
        }50%{
            width: 15ch;
        }100%{
            width: 0ch;
        }
    }
    .content .buttons{
        margin: 20px 0 0 50px;
    }
    .content .buttons button{
        color: #ffffff;
        margin: 0 10px;
        padding: 8px 6px;
        font-size: 20px;
        border-radius: 6px;
        background:linear-gradient(to right,rgb(1, 221, 255),rgb(219, 90, 255));
        cursor: pointer;
        border: none;
        transition: all .3s ease;
    }
    .content .buttons button:hover{
        transform: scale(.98);
    }
    .girl img{
        height:95%;
        position: absolute;
        right: 80px;
        bottom: 0;

    }
    .icons{
        position: absolute;
        bottom: 20px;
        right: 30px;
        display: flex;
        flex-direction: column;
    }
    .icons a{
        color: #323232;
        font-size: 22px;
        opacity: .7;
        margin: 4px 0;
    }
    .icons a:hover{
        opacity: 1;
    }
</style>
</head>

<body>
    <header>
        <nav>
            <div class="navbar">
                <div class="logo">
                    <img src="images/logo.png" alt="">
                </div>
                <ul>
                    <li><a href="">Home</a></li>
                    <li><a href="">Latest</a></li>
                    <li><a href="">Cetagory</a></li>
                    <li><a href="">Services</a></li>
                    <li><a href="">Contact</a></li>
                </ul>
                    <div class="search">
                    <input type="text" placeholder="search here...">
                    <a href=""><i class="fas fa-search"></i></a>
                </div>

            </div>
        </nav>
        <div class="content">
            <div class="text-content">
                <div class="text">Hello, it`s Me</div>
                <div class="name">Hannah lenonn</div>
                <div class="job">
                    <span>And, Iam a</span>
                    <div class="typing-text">
                        <span>Youtuber</span>
                        <span>,Blogger.</span>
                    </div>
                </div>
            </div>
            <div class="buttons">
                <button>About Me</button>
                <button>Follow Me</button>
            </div>
        </div>
        <div class="girl">
            <img src="images/girl.png" alt="">
        </div>
        <div class="icons">
            <a href=""><i class="fab fa-facebook"></i></a>
            <a href=""><i class="fab fa-twitter"></i></a>
            <a href=""><i class="fab fa-youtube"></i></a>
            <a href=""><i class="fab fa-linkedin"></i></a>
        </div>

    </header>
    
</body>
</html>
